name: amyloid_transport
description: >
  Tier 1 vascular and BBB amyloid transport module for Alzheimer's disease ODE models.
  Captures AB40/AB42 movement across BrainISF, BBB, CSF, and Plasma with LRP1 efflux,
  RAGE influx, P-gp efflux support, CSF bulk flow, and peripheral plasma clearance.
mechanism: "Vascular and Blood-Brain Barrier Transport"
notes: "Tier: 1 (core). Naming follows Elbert convention {species}_{compartment}."

compartments:
  - name: BrainISF
    volume_parameter: V_BrainISF
    volume_value: 0.25
    volume_units: L
    notes: "Tier-1 simplified ISF volume; Elbert includes smaller effective ISF subvolume in detailed models."
  - name: CSF
    volume_parameter: V_CSF
    volume_value: 0.14
    volume_units: L
    notes: "CSF pool for convective transport toward plasma."
  - name: Plasma
    volume_parameter: V_Plasma
    volume_value: 3.0
    volume_units: L
    notes: "Systemic plasma compartment."
  - name: BBB
    volume_parameter: V_BBB
    volume_value: 0.002
    volume_units: L
    notes: "Conceptual endothelial transport compartment (strategy guidance: ~0.002 L)."

species:
  - name: AB40_BrainISF
    initial_amount: 1.0e-9
    units: mol
  - name: AB40_CSF
    initial_amount: 0.5e-9
    units: mol
  - name: AB40_Plasma
    initial_amount: 0.2e-9
    units: mol
  - name: AB40_BBB
    initial_amount: 0.0
    units: mol
  - name: AB42_BrainISF
    initial_amount: 1.0e-9
    units: mol
  - name: AB42_CSF
    initial_amount: 0.5e-9
    units: mol
  - name: AB42_Plasma
    initial_amount: 0.1e-9
    units: mol
  - name: AB42_BBB
    initial_amount: 0.0
    units: mol
  - name: LRP1_BrainISF
    initial_amount: 0.1e-9
    units: mol
  - name: LRP1_CSF
    initial_amount: 0.05e-9
    units: mol
  - name: LRP1_Plasma
    initial_amount: 0.2e-9
    units: mol
  - name: LRP1_BBB
    initial_amount: 1.0e-9
    units: mol
  - name: RAGE_BrainISF
    initial_amount: 0.05e-9
    units: mol
  - name: RAGE_CSF
    initial_amount: 0.02e-9
    units: mol
  - name: RAGE_Plasma
    initial_amount: 0.1e-9
    units: mol
  - name: RAGE_BBB
    initial_amount: 0.6e-9
    units: mol
  - name: P_gp_BrainISF
    initial_amount: 0.0
    units: mol
  - name: P_gp_CSF
    initial_amount: 0.0
    units: mol
  - name: P_gp_Plasma
    initial_amount: 0.05e-9
    units: mol
  - name: P_gp_BBB
    initial_amount: 0.8e-9
    units: mol
  - name: sLRP1_BrainISF
    initial_amount: 0.05e-9
    units: mol
  - name: sLRP1_CSF
    initial_amount: 0.05e-9
    units: mol
  - name: sLRP1_Plasma
    initial_amount: 4.0e-9
    units: mol
  - name: sLRP1_BBB
    initial_amount: 0.05e-9
    units: mol

reactions:
  - name: LRP1Efflux_AB40_BrainISF_to_BBB
    reactants:
      - AB40_BrainISF
    products:
      - AB40_BBB
    rate_type: custom_conc_per_time
    rate_equation: "(Vmax_LRP1_AB40 * (LRP1_BBB / LRP1_ref_BBB) * (AB40_BrainISF / V_BrainISF)) / (Km_LRP1_AB40 + (AB40_BrainISF / V_BrainISF))"
    rate_parameters:
      - Vmax_LRP1_AB40
      - Km_LRP1_AB40
      - LRP1_ref_BBB
      - V_BrainISF
    evidence:
      - pmid: "15313568"
        source: "Deane et al. 2004"
        supports: "LRP1-mediated AB efflux from brain-facing side of BBB"
    rate_law_evidence:
      - source: "Strategy vascular BBB section 3"
        supports: "Michaelis-Menten form for LRP1 transport"

  - name: LRP1Release_AB40_BBB_to_Plasma
    reactants:
      - AB40_BBB
    products:
      - AB40_Plasma
    rate_type: UDF
    rate_parameters:
      - k_LRP1_release_AB40
    evidence:
      - source: "Mechanistic transcytosis abstraction"
        supports: "Efflux completion from BBB transit pool to plasma"
    rate_law_evidence:
      - source: "Tier-1 simplification"
        supports: "First-order release from BBB transit pool"

  - name: RAGEInflux_AB40_Plasma_to_BBB
    reactants:
      - AB40_Plasma
    products:
      - AB40_BBB
    rate_type: custom_conc_per_time
    rate_equation: "(Vmax_RAGE_AB40 * (RAGE_BBB / RAGE_ref_BBB) * (AB40_Plasma / V_Plasma)) / (Km_RAGE_AB40 + (AB40_Plasma / V_Plasma))"
    rate_parameters:
      - Vmax_RAGE_AB40
      - Km_RAGE_AB40
      - RAGE_ref_BBB
      - V_Plasma
    evidence:
      - pmid: "12805289"
      - source: "Deane et al. 2003"
        supports: "RAGE-mediated AB influx from blood to brain"
    rate_law_evidence:
      - source: "Strategy vascular BBB section 3"
        supports: "Michaelis-Menten form for RAGE transport"

  - name: RAGERelease_AB40_BBB_to_BrainISF
    reactants:
      - AB40_BBB
    products:
      - AB40_BrainISF
    rate_type: UDF
    rate_parameters:
      - k_RAGE_release_AB40
    evidence:
      - source: "Mechanistic transcytosis abstraction"
        supports: "Influx completion from BBB transit pool to brain ISF"
    rate_law_evidence:
      - source: "Tier-1 simplification"
        supports: "First-order release from BBB transit pool"

  - name: PgpEfflux_AB40_BBB_to_Plasma
    reactants:
      - AB40_BBB
    products:
      - AB40_Plasma
    rate_type: custom_conc_per_time
    rate_equation: "k_Pgp_efflux_AB40 * (P_gp_BBB / P_gp_ref_BBB) * (AB40_BBB / V_BBB)"
    rate_parameters:
      - k_Pgp_efflux_AB40
      - P_gp_ref_BBB
      - V_BBB
    evidence:
      - source: "P-gp contribution to AB efflux at BBB"
        supports: "Transporter-assisted efflux augmentation"
    rate_law_evidence:
      - source: "Tier-1 linear transporter scaling"
        supports: "First-order in substrate and transporter level"

  - name: Passive_AB40_BrainISF_BBB
    reactants:
      - AB40_BrainISF
    products:
      - AB40_BBB
    rate_type: BDF
    rate_parameters:
      - k_passive_BrainISF_BBB_AB40
    evidence:
      - pmid: "16081038"
        source: "Pardridge 2005"
        supports: "Passive permeability contribution across BBB"
    rate_law_evidence:
      - source: "Elbert-style bidirectional flow construct"
        supports: "Single reversible exchange constant for simplified passive transport"

  - name: Passive_AB40_BBB_Plasma
    reactants:
      - AB40_BBB
    products:
      - AB40_Plasma
    rate_type: BDF
    rate_parameters:
      - k_passive_BBB_Plasma_AB40
    evidence:
      - source: "BBB permeability abstraction"
        supports: "Passive exchange between endothelial pool and plasma"
    rate_law_evidence:
      - source: "Tier-1 bidirectional lumping"
        supports: "Reversible passive term"

  - name: BulkFlow_AB40_BrainISF_to_CSF
    reactants:
      - AB40_BrainISF
    products:
      - AB40_CSF
    rate_type: UDF
    rate_parameters:
      - k_AB40_BrainISF_to_CSF
    evidence:
      - source: "Elbert flow structure and CSF turnover terms"
        snippet: "Q_CSF = 0.024; Flow terms scale with concentration and flow"
        supports: "Convective movement from interstitial/brain fluid into CSF stream"
    rate_law_evidence:
      - source: "Tier-1 mapping from Q_CSF to first-order transfer"
        supports: "UDF first-order bulk flow approximation"

  - name: BulkFlow_AB40_CSF_to_Plasma
    reactants:
      - AB40_CSF
    products:
      - AB40_Plasma
    rate_type: UDF
    rate_parameters:
      - k_AB40_CSF_to_Plasma
    evidence:
      - source: "Elbert CSF outflow network"
        supports: "Downstream CSF drainage to peripheral compartment"
    rate_law_evidence:
      - source: "Tier-1 mapping from Q_CSF and CSF volume"
        supports: "First-order CSF clearance transfer"

  - name: PlasmaClearance_AB40
    reactants:
      - AB40_Plasma
    products: []
    rate_type: MA
    rate_parameters:
      - Kdeg_AB40
    evidence:
      - source: "Elbert parameter"
        snippet: "Kdeg_AB40 = 7.002601312955259 # Fit to plasma data"
        supports: "AB40 plasma degradation/clearance rate"
    rate_law_evidence:
      - source: "Elbert plasma fit"
        supports: "First-order peripheral clearance"

  - name: LRP1Efflux_AB42_BrainISF_to_BBB
    reactants:
