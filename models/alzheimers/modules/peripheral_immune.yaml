name: peripheral_immune
description: >
  Tier 4 peripheral immune module for Alzheimer's disease ODE models.
  Captures monocyte trafficking, macrophage differentiation in BrainISF,
  peripheral T cell dynamics, TNFA/IL6/CRP inflammatory signaling,
  and anti-AB antibody immunotherapy with brain entry and AB42 complex clearance.
mechanism: "Neuroinflammation"
notes: "Tier: 4. Compartments constrained to Plasma and BrainISF. CRP represented as CRP_Plasma and anti-AB antibody as anti_AB_antibody_Plasma/BrainISF."

compartments:
  - name: Plasma
    volume_parameter: V_Plasma
    volume_value: 3.0
    volume_units: L
    notes: "Peripheral immune and cytokine pool."
  - name: BrainISF
    volume_parameter: V_BrainISF
    volume_value: 0.25
    volume_units: L
    notes: "Brain interstitial fluid interface for infiltrating immune cells and antibody-AB42 interactions."

species:
  - name: MONOCYTE_Plasma
    initial_amount: 1.0e-9
    units: cell_equiv
  - name: MACROPHAGE_BrainISF
    initial_amount: 0.05e-9
    units: cell_equiv
  - name: T_CELL_Plasma
    initial_amount: 0.8e-9
    units: cell_equiv
  - name: T_CELL_BrainISF
    initial_amount: 0.02e-9
    units: cell_equiv
  - name: TNFA_Plasma
    initial_amount: 0.01e-9
    units: mol
  - name: IL6_Plasma
    initial_amount: 0.02e-9
    units: mol
  - name: CRP_Plasma
    initial_amount: 0.03e-9
    units: mol
  - name: anti_AB_antibody_Plasma
    initial_amount: 0.2e-9
    units: mol
  - name: anti_AB_antibody_BrainISF
    initial_amount: 0.01e-9
    units: mol
  - name: AB42_BrainISF
    initial_amount: 0.2e-9
    units: mol
    notes: "Shared coupling species from amyloid modules."
  - name: AB42_anti_AB_complex_BrainISF
    initial_amount: 0.0
    units: mol

reactions:
  - name: Monocyte_Production_Plasma
    reactants: []
    products:
      - MONOCYTE_Plasma
    rate_type: MA
    rate_parameters:
      - k_monocyte_prod

  - name: Monocyte_Clearance_Plasma
    reactants:
      - MONOCYTE_Plasma
    products: []
    rate_type: MA
    rate_parameters:
      - k_monocyte_clear

  - name: Monocyte_Infiltration_to_BrainISF
    reactants:
      - MONOCYTE_Plasma
    products:
      - MACROPHAGE_BrainISF
    rate_type: custom_conc_per_time
    rate_equation: "k_monocyte_infiltration * (MONOCYTE_Plasma / V_Plasma) * (1 + amp_TNFA_monocyte_entry * (TNFA_Plasma / V_Plasma) / (K_TNFA_monocyte_entry + (TNFA_Plasma / V_Plasma)))"
    rate_parameters:
      - k_monocyte_infiltration
      - amp_TNFA_monocyte_entry
      - K_TNFA_monocyte_entry
      - V_Plasma

  - name: Macrophage_Turnover_BrainISF
    reactants:
      - MACROPHAGE_BrainISF
    products: []
    rate_type: MA
    rate_parameters:
      - k_macrophage_turnover

  - name: TCell_Production_Plasma
    reactants: []
    products:
      - T_CELL_Plasma
    rate_type: MA
    rate_parameters:
      - k_tcell_prod

  - name: TCell_Clearance_Plasma
    reactants:
      - T_CELL_Plasma
    products: []
    rate_type: MA
    rate_parameters:
      - k_tcell_clear

  - name: TCell_Entry_to_BrainISF
    reactants:
      - T_CELL_Plasma
    products:
      - T_CELL_BrainISF
    rate_type: custom_conc_per_time
    rate_equation: "k_tcell_entry * (T_CELL_Plasma / V_Plasma) * ((TNFA_Plasma / V_Plasma) / (K_TNFA_tcell_entry + (TNFA_Plasma / V_Plasma)))"
    rate_parameters:
      - k_tcell_entry
      - K_TNFA_tcell_entry
      - V_Plasma

  - name: TCell_Egress_to_Plasma
    reactants:
      - T_CELL_BrainISF
    products:
      - T_CELL_Plasma
    rate_type: MA
    rate_parameters:
      - k_tcell_egress

  - name: TNFA_Production_Plasma
    reactants: []
    products:
      - TNFA_Plasma
    rate_type: custom_conc_per_time
    rate_equation: "k_tnfa_prod * ((MONOCYTE_Plasma / V_Plasma) + alpha_tcell_tnfa * (T_CELL_Plasma / V_Plasma)) / (1 + (anti_AB_antibody_Plasma / V_Plasma) / IC50_anti_inflam)"
    rate_parameters:
      - k_tnfa_prod
      - alpha_tcell_tnfa
      - IC50_anti_inflam
      - V_Plasma

  - name: TNFA_Clearance_Plasma
    reactants:
      - TNFA_Plasma
    products: []
    rate_type: MA
    rate_parameters:
      - k_tnfa_clear

  - name: IL6_Production_Plasma
    reactants: []
    products:
      - IL6_Plasma
    rate_type: custom_conc_per_time
    rate_equation: "k_il6_prod * (((MONOCYTE_Plasma / V_Plasma) + alpha_tcell_il6 * (T_CELL_Plasma / V_Plasma)) * ((TNFA_Plasma / V_Plasma) / (K_TNFA_il6 + (TNFA_Plasma / V_Plasma))))"
    rate_parameters:
      - k_il6_prod
      - alpha_tcell_il6
      - K_TNFA_il6
      - V_Plasma

  - name: IL6_Clearance_Plasma
    reactants:
      - IL6_Plasma
    products: []
    rate_type: MA
    rate_parameters:
      - k_il6_clear

  - name: CRP_Production_from_IL6
    reactants: []
    products:
      - CRP_Plasma
    rate_type: custom_conc_per_time
    rate_equation: "k_crp_prod_max * ((IL6_Plasma / V_Plasma)^n_crp_il6) / (K_IL6_CRP^n_crp_il6 + (IL6_Plasma / V_Plasma)^n_crp_il6)"
    rate_parameters:
      - k_crp_prod_max
      - n_crp_il6
      - K_IL6_CRP
      - V_Plasma

  - name: CRP_Clearance_Plasma
    reactants:
      - CRP_Plasma
    products: []
    rate_type: MA
    rate_parameters:
      - k_crp_clear

  - name: AntiAB_Antibody_Dose_Input
    reactants: []
    products:
      - anti_AB_antibody_Plasma
    rate_type: MA
    rate_parameters:
      - k_anti_ab_dose

  - name: AntiAB_Antibody_Clearance_Plasma
    reactants:
      - anti_AB_antibody_Plasma
    products: []
    rate_type: MA
    rate_parameters:
      - k_anti_ab_clear

  - name: AntiAB_Antibody_Transport_to_BrainISF
    reactants:
      - anti_AB_antibody_Plasma
    products:
      - anti_AB_antibody_BrainISF
    rate_type: MA
    rate_parameters:
      - k_anti_ab_brain_entry

  - name: AntiAB_Binding_AB42_BrainISF
    reactants:
      - anti_AB_antibody_BrainISF
      - AB42_BrainISF
    products:
      - AB42_anti_AB_complex_BrainISF
    rate_type: custom_conc_per_time
    rate_equation: "k_ab42_ab_bind * (anti_AB_antibody_BrainISF / V_BrainISF) * (AB42_BrainISF / V_BrainISF) / (EC50_anti_ab_bind + (AB42_BrainISF / V_BrainISF))"
    rate_parameters:
      - k_ab42_ab_bind
      - EC50_anti_ab_bind
      - V_BrainISF

  - name: AB42_Antibody_Complex_Clearance
    reactants:
      - AB42_anti_AB_complex_BrainISF
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "k_ab42_complex_clear * (AB42_anti_AB_complex_BrainISF / V_BrainISF) * (1 + (MACROPHAGE_BrainISF / V_BrainISF) / K_MACROPHAGE_complex_clear)"
    rate_parameters:
      - k_ab42_complex_clear
      - K_MACROPHAGE_complex_clear
      - V_BrainISF

parameters:
