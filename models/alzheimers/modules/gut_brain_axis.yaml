evidence:
  - source: "plan/strategy_neuroinflammation.md"
    supports: "Use of saturating inflammatory signaling motifs and first-order turnover in neuroinflammation coupling"
  - source: "Exploratory gut-brain axis abstraction"
    supports: "SCFA-protective and LPS/TMAO-proinflammatory coupling to brain cytokine drive"
