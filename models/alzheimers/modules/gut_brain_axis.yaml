  - name: K_inflam_vagal
    value: 5.0e-9
    units: M
    confidence: assumed
    source: "Tier 4 placeholder inflammatory midpoint for vagal suppression"

  - name: k_tnfa_brain_prod
    value: 0.08
    units: M/day
    confidence: estimated
    source: "strategy_neuroinflammation.md cytokine production motif adapted for peripheral-to-brain drive"

  - name: K_LPS_tnfa
