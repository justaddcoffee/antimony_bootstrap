name: bbb_integrity
description: >
  Tier 3 blood-brain barrier integrity module for Alzheimer's disease ODE models.
  Captures tight-junction turnover (claudin-5, occludin, ZO-1), MMP2/MMP9-mediated
  degradation, PDGFRB-dependent pericyte maintenance, VEGF-driven vascular stress,
  and dynamic BBB permeability remodeling across BBB, BrainISF, and Plasma.
mechanism: "Vascular and Blood-Brain Barrier Dysfunction"
notes: "Tier: 3. Compartments constrained to BBB, BrainISF, and Plasma."

compartments:
  - name: BBB
    volume_parameter: V_BBB
    volume_value: 0.002
    volume_units: L
    notes: "Lumped endothelial/perivascular interface containing tight junction and pericyte states."
  - name: BrainISF
    volume_parameter: V_BrainISF
    volume_value: 0.25
    volume_units: L
    notes: "Interstitial fluid compartment carrying MMP and VEGF signals affecting BBB integrity."
  - name: Plasma
    volume_parameter: V_Plasma
    volume_value: 3.0
    volume_units: L
    notes: "Systemic compartment providing circulating VEGF input."

species:
  - name: TJ_CLAUDIN5_BBB
    initial_amount: 1.0e-9
    units: mol
  - name: TJ_OCCLUDIN_BBB
    initial_amount: 1.0e-9
    units: mol
  - name: TJ_ZO1_BBB
    initial_amount: 1.0e-9
    units: mol
  - name: PERICYTE_BBB
    initial_amount: 1.0
    units: cell_equiv
  - name: PDGFRB_BBB
    initial_amount: 8.0e-10
    units: mol
  - name: PDGFRB_active_BBB
    initial_amount: 2.0e-10
    units: mol
  - name: MMP2_BrainISF
    initial_amount: 0.03e-9
    units: mol
  - name: MMP9_BrainISF
    initial_amount: 0.05e-9
    units: mol
  - name: VEGF_Plasma
    initial_amount: 0.30e-9
    units: mol
  - name: VEGF_BrainISF
    initial_amount: 0.06e-9
    units: mol
  - name: BBB_permeability_BBB
    initial_amount: 1.0
    units: arb
    notes: "Normalized permeability state (1 = baseline intact BBB, higher = leakier BBB)."

reactions:
  - name: TJ_CLAUDIN5_Synthesis
    reactants: []
    products:
      - TJ_CLAUDIN5_BBB
    rate_type: custom_conc_per_time
    rate_equation: "k_tj_cldn5_syn * (PERICYTE_BBB / Pericyte_ref)"
    rate_parameters:
      - k_tj_cldn5_syn
      - Pericyte_ref

  - name: TJ_CLAUDIN5_BasalTurnover
    reactants:
      - TJ_CLAUDIN5_BBB
    products: []
    rate_type: MA
    rate_parameters:
      - k_tj_cldn5_deg

  - name: TJ_CLAUDIN5_MMP2_Degradation
    reactants:
      - TJ_CLAUDIN5_BBB
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "k_tj_mmp2_deg * (TJ_CLAUDIN5_BBB / V_BBB) * (MMP2_BrainISF / V_BrainISF)"
    rate_parameters:
      - k_tj_mmp2_deg
      - V_BBB
      - V_BrainISF

  - name: TJ_CLAUDIN5_MMP9_Degradation
    reactants:
      - TJ_CLAUDIN5_BBB
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "k_tj_mmp9_deg * (TJ_CLAUDIN5_BBB / V_BBB) * (MMP9_BrainISF / V_BrainISF)"
    rate_parameters:
      - k_tj_mmp9_deg
      - V_BBB
      - V_BrainISF

  - name: TJ_OCCLUDIN_Synthesis
    reactants: []
    products:
      - TJ_OCCLUDIN_BBB
    rate_type: custom_conc_per_time
    rate_equation: "k_tj_ocln_syn * (PERICYTE_BBB / Pericyte_ref)"
    rate_parameters:
      - k_tj_ocln_syn
      - Pericyte_ref

  - name: TJ_OCCLUDIN_BasalTurnover
    reactants:
      - TJ_OCCLUDIN_BBB
    products: []
    rate_type: MA
    rate_parameters:
      - k_tj_ocln_deg

  - name: TJ_OCCLUDIN_MMP9_Degradation
    reactants:
      - TJ_OCCLUDIN_BBB
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "k_tj_mmp9_deg * (TJ_OCCLUDIN_BBB / V_BBB) * (MMP9_BrainISF / V_BrainISF)"
    rate_parameters:
      - k_tj_mmp9_deg
      - V_BBB
      - V_BrainISF

  - name: TJ_ZO1_Synthesis
    reactants: []
    products:
      - TJ_ZO1_BBB
    rate_type: custom_conc_per_time
    rate_equation: "k_tj_zo1_syn * (PERICYTE_BBB / Pericyte_ref)"
    rate_parameters:
      - k_tj_zo1_syn
      - Pericyte_ref

  - name: TJ_ZO1_BasalTurnover
    reactants:
      - TJ_ZO1_BBB
    products: []
    rate_type: MA
    rate_parameters:
      - k_tj_zo1_deg

  - name: TJ_ZO1_MMP2_Degradation
    reactants:
      - TJ_ZO1_BBB
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "k_tj_mmp2_deg * (TJ_ZO1_BBB / V_BBB) * (MMP2_BrainISF / V_BrainISF)"
    rate_parameters:
      - k_tj_mmp2_deg
      - V_BBB
      - V_BrainISF

  - name: Pericyte_Maintenance_by_PDGFRB
    reactants: []
    products:
      - PERICYTE_BBB
    rate_type: custom_conc_per_time
    rate_equation: "k_pericyte_maint * (PDGFRB_active_BBB / PDGFRB_active_ref)"
    rate_parameters:
      - k_pericyte_maint
      - PDGFRB_active_ref

  - name: Pericyte_BasalLoss
    reactants:
      - PERICYTE_BBB
    products: []
    rate_type: MA
    rate_parameters:
      - k_pericyte_loss_basal

  - name: Pericyte_Loss_by_MMP9
    reactants:
      - PERICYTE_BBB
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "k_pericyte_loss_mmp9 * (PERICYTE_BBB / Pericyte_ref) * (MMP9_BrainISF / V_BrainISF)"
    rate_parameters:
      - k_pericyte_loss_mmp9
      - Pericyte_ref
      - V_BrainISF

  - name: PDGFRB_Synthesis
    reactants: []
    products:
      - PDGFRB_BBB
    rate_type: MA
    rate_parameters:
      - k_pdgfrb_syn

  - name: PDGFRB_Turnover
    reactants:
      - PDGFRB_BBB
    products: []
    rate_type: MA
    rate_parameters:
      - k_pdgfrb_deg

  - name: PDGFRB_Activation
    reactants:
      - PDGFRB_BBB
    products:
      - PDGFRB_active_BBB
    rate_type: custom_conc_per_time
    rate_equation: "k_pdgfrb_act * (PDGFRB_BBB / V_BBB) / (1 + beta_vegf_pdgfrb_inhib * (VEGF_BrainISF / V_BrainISF))"
    rate_parameters:
      - k_pdgfrb_act
      - beta_vegf_pdgfrb_inhib
      - V_BBB
      - V_BrainISF

  - name: PDGFRB_Deactivation
    reactants:
      - PDGFRB_active_BBB
    products:
      - PDGFRB_BBB
    rate_type: MA
    rate_parameters:
      - k_pdgfrb_deact

  - name: MMP9_Production_by_VEGF
    reactants: []
    products:
      - MMP9_BrainISF
    rate_type: custom_conc_per_time
    rate_equation: "k_mmp9_prod_basal + k_mmp9_prod_vegf * (VEGF_BrainISF / V_BrainISF)"
    rate_parameters:
      - k_mmp9_prod_basal
      - k_mmp9_prod_vegf
      - V_BrainISF

  - name: MMP9_Clearance
    reactants:
      - MMP9_BrainISF
    products: []
    rate_type: MA
    rate_parameters:
      - k_mmp9_clear

  - name: VEGF_Transport_Plasma_to_BrainISF
    reactants:
      - VEGF_Plasma
    products:
      - VEGF_BrainISF
    rate_type: custom_conc_per_time
    rate_equation: "k_vegf_influx * BBB_permeability_BBB * (VEGF_Plasma / V_Plasma)"
    rate_parameters:
      - k_vegf_influx
      - V_Plasma

  - name: VEGF_BrainISF_Clearance
    reactants:
      - VEGF_BrainISF
    products: []
    rate_type: MA
    rate_parameters:
      - k_vegf_brain_clear

  - name: BBB_Permeability_BasalIncrease
    reactants: []
    products:
      - BBB_permeability_BBB
    rate_type: MA
    rate_parameters:
      - k_bbb_perm_baseline_drift

  - name: BBB_Permeability_Increase_by_MMP_and_VEGF
    reactants: []
    products:
      - BBB_permeability_BBB
    rate_type: custom_conc_per_time
    rate_equation: "k_bbb_perm_mmp * ((MMP2_BrainISF + MMP9_BrainISF) / V_BrainISF) + k_bbb_perm_vegf * (VEGF_BrainISF / V_BrainISF)"
    rate_parameters:
      - k_bbb_perm_mmp
      - k_bbb_perm_vegf
      - V_BrainISF

  - name: BBB_Permeability_Repair_by_TJ_and_Pericyte
    reactants:
      - BBB_permeability_BBB
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "k_bbb_perm_repair * (BBB_permeability_BBB / BBBperm_ref) * ((TJ_CLAUDIN5_BBB + TJ_OCCLUDIN_BBB + TJ_ZO1_BBB) / TJ_total_ref) * (PERICYTE_BBB / Pericyte_ref)"
    rate_parameters:
      - k_bbb_perm_repair
      - BBBperm_ref
      - TJ_total_ref
      - Pericyte_ref

