    source: "strategy_vascular_bbb: tight-junction turnover (12-24 hr scale)"

  - name: k_tj_ocln_syn
    value: 0.018
    units: mol/hr
    confidence: assumed
    source: "strategy_vascular_bbb: tight-junction turnover (12-24 hr scale)"

  - name: k_tj_zo1_syn
    value: 0.016
    units: mol/hr
    confidence: assumed
    source: "strategy_vascular_bbb: tight-junction turnover (12-24 hr scale)"

  - name: k_tj_cldn5_deg
    value: 0.030
    units: 1/hr
    confidence: assumed
