name: epigenetics
description: >
  Tier 4 exploratory epigenetics module for Alzheimer's disease ODE models.
  Captures neuronal DNA methylation balance, histone acetylation/deacetylation,
  repressive histone methylation, and miRNA (miR-146a/miR-155) dynamics that can
  provide cross-module modifiers for transcriptional output and inflammatory tone.
mechanism: "Epigenetics and Gene Regulation"
notes: "Tier: 4 (exploratory). Most kinetics are assumed placeholders intended to provide epigenetic modifier outputs for other modules."

compartments:
  - name: Neuron
    volume_parameter: V_Neuron
    volume_value: 0.0005
    volume_units: L
    notes: "Neuronal intracellular compartment for chromatin and miRNA state proxies."

species:
  - name: DNMT1_Neuron
    initial_amount: 8.0e-11
    units: mol
    notes: "Maintenance DNA methyltransferase activity proxy."
  - name: DNMT3A_Neuron
    initial_amount: 6.0e-11
    units: mol
    notes: "De novo DNA methyltransferase activity proxy."
  - name: HDAC_Neuron
    initial_amount: 1.1e-10
    units: mol
    notes: "Lumped histone deacetylase activity pool."
  - name: HAT_Neuron
    initial_amount: 9.0e-11
    units: mol
    notes: "Lumped histone acetyltransferase activity pool."
  - name: SIRT1_Neuron
    initial_amount: 7.0e-11
    units: mol
    notes: "NAD-dependent deacetylase pool providing protective deacetylation pressure."
  - name: global_methylation_Neuron
    initial_amount: 2.5e-10
    units: mol
    notes: "Global DNA methylation state proxy."
  - name: H3K9ac_Neuron
    initial_amount: 1.8e-10
    units: mol
    notes: "Histone H3K9 acetylation state proxy (generally permissive mark)."
  - name: H3K27me3_Neuron
    initial_amount: 1.5e-10
    units: mol
    notes: "Histone H3K27 trimethylation state proxy (repressive mark)."
  - name: miR146a_Neuron
    initial_amount: 4.0e-11
    units: mol
    notes: "Anti-inflammatory microRNA proxy."
  - name: miR155_Neuron
    initial_amount: 3.0e-11
    units: mol
    notes: "Pro-inflammatory microRNA proxy."

reactions:
  - name: DNA_Methylation_Addition_Neuron
    reactants: []
    products:
      - global_methylation_Neuron
    rate_type: custom_conc_per_time
    rate_equation: "k_methyl_add * (((DNMT1_Neuron / V_Neuron) + (DNMT3A_Neuron / V_Neuron)) / (K_DNMT_activity + (DNMT1_Neuron / V_Neuron) + (DNMT3A_Neuron / V_Neuron))) * (1 - (global_methylation_Neuron / V_Neuron) / methylation_cap)"
    rate_parameters:
      - k_methyl_add
      - K_DNMT_activity
      - methylation_cap
      - V_Neuron
    notes: "Saturable DNMT1/DNMT3A-driven global DNA methylation addition."

  - name: DNA_Demethylation_Neuron
    reactants:
      - global_methylation_Neuron
    products: []
    rate_type: MA
    rate_parameters:
      - k_methyl_remove
    notes: "Lumped first-order active/passive demethylation flux."

  - name: H3K9_Acetylation_by_HAT_Neuron
    reactants: []
    products:
      - H3K9ac_Neuron
    rate_type: custom_conc_per_time
    rate_equation: "k_H3K9_acetyl * ((HAT_Neuron / V_Neuron) / (K_HAT_activity + (HAT_Neuron / V_Neuron))) * (1 - (H3K9ac_Neuron / V_Neuron) / H3K9ac_cap)"
    rate_parameters:
      - k_H3K9_acetyl
      - K_HAT_activity
      - H3K9ac_cap
      - V_Neuron
    notes: "HAT-driven acetylation of permissive chromatin mark H3K9ac."

  - name: H3K9_Deacetylation_by_HDAC_SIRT1_Neuron
    reactants:
      - H3K9ac_Neuron
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "k_H3K9_deacetyl * (H3K9ac_Neuron / V_Neuron) * (((HDAC_Neuron / V_Neuron) + sf_SIRT1_on_HDAC_axis * (SIRT1_Neuron / V_Neuron)) / (K_HDAC_SIRT1_activity + (HDAC_Neuron / V_Neuron) + sf_SIRT1_on_HDAC_axis * (SIRT1_Neuron / V_Neuron)))"
    rate_parameters:
      - k_H3K9_deacetyl
      - sf_SIRT1_on_HDAC_axis
      - K_HDAC_SIRT1_activity
      - V_Neuron
    notes: "Combined HDAC and SIRT1 deacetylation pressure on H3K9ac."

  - name: H3K27me3_Deposition_Neuron
    reactants: []
    products:
      - H3K27me3_Neuron
    rate_type: custom_conc_per_time
    rate_equation: "k_H3K27me3_add * (((DNMT3A_Neuron / V_Neuron) + sf_methyl_to_H3K27 * (global_methylation_Neuron / V_Neuron)) / (K_H3K27_writer + (DNMT3A_Neuron / V_Neuron) + sf_methyl_to_H3K27 * (global_methylation_Neuron / V_Neuron))) * (1 - (H3K27me3_Neuron / V_Neuron) / H3K27me3_cap)"
    rate_parameters:
      - k_H3K27me3_add
      - sf_methyl_to_H3K27
      - K_H3K27_writer
      - H3K27me3_cap
      - V_Neuron
    notes: "Repressive mark deposition linked to DNMT3A/global methylation context."

  - name: H3K27me3_Demethylation_Neuron
    reactants:
      - H3K27me3_Neuron
    products: []
    rate_type: MA
    rate_parameters:
      - k_H3K27me3_remove
    notes: "Lumped first-order removal of repressive histone methylation mark."

  - name: miR146a_Synthesis_Neuron
    reactants: []
    products:
      - miR146a_Neuron
    rate_type: custom_conc_per_time
    rate_equation: "k_miR146a_syn * ((H3K9ac_Neuron / V_Neuron) / (K_act_H3K9ac_miR146a + (H3K9ac_Neuron / V_Neuron))) * (K_rep_H3K27_miR146a / (K_rep_H3K27_miR146a + (H3K27me3_Neuron / V_Neuron)))"
    rate_parameters:
      - k_miR146a_syn
      - K_act_H3K9ac_miR146a
      - K_rep_H3K27_miR146a
      - V_Neuron
    notes: "miR-146a production favored by permissive acetylation and opposed by repressive chromatin."

  - name: miR146a_Turnover_Neuron
    reactants:
      - miR146a_Neuron
    products: []
    rate_type: MA
    rate_parameters:
      - k_miR146a_deg
    notes: "First-order miR-146a turnover."

  - name: miR155_Synthesis_Neuron
    reactants: []
    products:
      - miR155_Neuron
    rate_type: custom_conc_per_time
    rate_equation: "k_miR155_syn * (K_rep_SIRT1_miR155 / (K_rep_SIRT1_miR155 + (SIRT1_Neuron / V_Neuron))) * (K_rep_methyl_miR155 / (K_rep_methyl_miR155 + (global_methylation_Neuron / V_Neuron)))"
    rate_parameters:
      - k_miR155_syn
      - K_rep_SIRT1_miR155
      - K_rep_methyl_miR155
      - V_Neuron
    notes: "miR-155 production increases under low SIRT1 and hypomethylated context."

  - name: miR155_Turnover_Neuron
    reactants:
      - miR155_Neuron
    products: []
    rate_type: MA
    rate_parameters:
      - k_miR155_deg
    notes: "First-order miR-155 turnover."

