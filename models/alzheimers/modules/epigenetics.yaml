    units: mol/L
    confidence: assumed
    source: "Tier 4 exploratory placeholder"

  - name: k_H3K27me3_add
    value: 5.0e-02
    units: 1/hr
    confidence: assumed
    source: "Tier 4 exploratory placeholder"

  - name: sf_methyl_to_H3K27
