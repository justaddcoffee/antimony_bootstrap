rules:
  - name: epi_activation_index
    equation: "epi_activation_index = (H3K9ac_Neuron / V_Neuron) / (K_epi_activation + (H3K9ac_Neuron / V_Neuron))"
    notes: "Activation proxy from permissive acetylation state."

  - name: epi_repression_index
    equation: "epi_repression_index = ((global_methylation_Neuron / V_Neuron) / (K_epi_methyl_repress + (global_methylation_Neuron / V_Neuron))) + ((H3K27me3_Neuron / V_Neuron) / (K_epi_H3K27_repress + (H3K27me3_Neuron / V_Neuron)))"
    notes: "Combined repression proxy from DNA methylation and H3K27me3 states."

  - name: mod_epigenetic_gene_expression
    equation: "mod_epigenetic_gene_expression = (1 + sf_epi_activation * epi_activation_index) / (1 + sf_epi_repression * epi_repression_index)"
    notes: "Cross-module output scaling transcription-linked production rates."

  - name: mod_epigenetic_inflammatory_tone
    equation: "mod_epigenetic_inflammatory_tone = (1 + sf_miR155_inflam * (miR155_Neuron / V_Neuron)) / (1 + sf_miR146a_inflam * (miR146a_Neuron / V_Neuron))"
    notes: "Cross-module output scaling pro-vs-anti inflammatory drive from miRNA balance."

evidence:
  - source: "plan/strategy_synaptic_neuronal.md"
    supports: "Neuron compartment convention and exploratory Tier 4 module framing"
  - source: "plan/batch_27_findings.md"
    pmid: "25129075"
    supports: "AD-associated neuronal DNA methylation dysregulation context"
  - source: "plan/batch_29_findings.md"
    supports: "SIRT1-linked deacetylation and AD-relevant epigenetic regulation motifs"
