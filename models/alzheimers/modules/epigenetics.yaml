    units: mol/L
    confidence: assumed
    source: "Tier 4 exploratory placeholder"

  - name: methylation_cap
    value: 1.0e-06
    units: mol/L
    confidence: assumed
    source: "Tier 4 exploratory placeholder"

  - name: k_methyl_remove
    value: 2.0e-02
    units: 1/hr
    confidence: estimated
    source: "Order-of-magnitude chromatin-mark turnover abstraction"

  - name: k_H3K9_acetyl
    value: 8.0e-02
    units: 1/hr
    confidence: assumed
    source: "Tier 4 exploratory placeholder"

  - name: K_HAT_activity
    value: 1.5e-07
    units: mol/L
    confidence: assumed
    source: "Tier 4 exploratory placeholder"

  - name: H3K9ac_cap
    value: 9.0e-07
    units: mol/L
    confidence: assumed
    source: "Tier 4 exploratory placeholder"

  - name: k_H3K9_deacetyl
    value: 9.0e-02
    units: 1/hr
    confidence: assumed
    source: "Tier 4 exploratory placeholder"

  - name: sf_SIRT1_on_HDAC_axis
    value: 1.4
    units: dimensionless
    confidence: estimated
    source: "SIRT1 deacetylase reinforcement assumption"

  - name: K_HDAC_SIRT1_activity
