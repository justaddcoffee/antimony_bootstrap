  - name: k_miR155_syn
    value: 3.8e-02
    units: mol/L/hr
    confidence: assumed
    source: "Tier 4 exploratory placeholder"

  - name: K_rep_SIRT1_miR155
    value: 1.1e-07
    units: mol/L
