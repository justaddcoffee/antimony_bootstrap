  - name: k_miR146a_syn
    value: 3.5e-02
    units: mol/L/hr
    confidence: assumed
    source: "Tier 4 exploratory placeholder"

  - name: K_act_H3K9ac_miR146a
    value: 1.2e-07
    units: mol/L
    confidence: assumed
    source: "Tier 4 exploratory placeholder"

  - name: K_rep_H3K27_miR146a
    value: 1.0e-07
    units: mol/L
    confidence: assumed
    source: "Tier 4 exploratory placeholder"

  - name: k_miR146a_deg
    value: 1.2e-01
    units: 1/hr
