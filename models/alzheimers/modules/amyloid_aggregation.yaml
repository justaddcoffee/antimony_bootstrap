name: amyloid_aggregation
description: >
  Tier 1 amyloid aggregation module for Alzheimer's disease ODE models.
  Captures AB42/AB40 primary nucleation, secondary nucleation, oligomer-protofibril
  conversion, fibril elongation/fragmentation, and plaque deposition/clearance between
  BrainISF and BrainParenchyma using Elbert-compatible naming and Knowles/Cohen kinetics.
mechanism: "Amyloid Cascade"
notes: "Tier: 1 (core). Includes nucleation-polymerization custom kinetics and simplified plaque dynamics."

compartments:
  - name: BrainISF
    volume_parameter: V_BrainISF
    volume_value: 0.25
    volume_units: L
    notes: "Primary soluble aggregation compartment."
  - name: BrainParenchyma
    volume_parameter: V_BrainParenchyma
    volume_value: 1.0
    volume_units: L
    notes: "Insoluble plaque deposition compartment."

species:
  - name: AB42_monomer_BrainISF
    initial_amount: 1.0e-9
    units: mol
  - name: AB42_oligomer_BrainISF
    initial_amount: 5.0e-11
    units: mol
  - name: AB42_protofibril_BrainISF
    initial_amount: 1.0e-11
    units: mol
  - name: AB42_fibril_BrainISF
    initial_amount: 1.0e-11
    units: mol
  - name: AB40_monomer_BrainISF
    initial_amount: 2.0e-9
    units: mol
  - name: AB40_oligomer_BrainISF
    initial_amount: 5.0e-11
    units: mol
  - name: AB40_protofibril_BrainISF
    initial_amount: 1.0e-11
    units: mol
  - name: AB40_fibril_BrainISF
    initial_amount: 1.0e-11
    units: mol
  - name: AB_plaque_BrainParenchyma
    initial_amount: 2.0e-10
    units: mol

reactions:
  - name: PrimaryOligomerization_AB42_BrainISF
    reactants:
      - AB42_monomer_BrainISF
    products:
      - AB42_oligomer_BrainISF
    rate_type: custom_conc_per_time
    rate_equation: "n_oligo1_AB42 * k_oligo1_AB42 * (AB42_monomer_BrainISF / V_BrainISF)^n_oligo1_AB42"
    rate_parameters:
      - n_oligo1_AB42
      - k_oligo1_AB42
      - V_BrainISF
    evidence:
      - source: "Elbert noSILK 1c reaction PrimaryOligomerization_AB42_BrainISF"
        supports: "Primary AB42 oligomer formation pathway"
    rate_law_evidence:
      - pmid: "19700509"
        source: "Knowles et al. 2009"
        supports: "Nucleation power-law kinetics"

  - name: SecondaryOligomerization_AB42_BrainISF
    reactants:
      - AB42_monomer_BrainISF
    products:
      - AB42_oligomer_BrainISF
    rate_type: custom_conc_per_time
    rate_equation: "n_oligo2_AB42 * k_oligo2_AB42 * (AB42_monomer_BrainISF / V_BrainISF)^n_oligo2_AB42 * (AB42_fibril_BrainISF / V_BrainISF)"
    rate_parameters:
      - n_oligo2_AB42
      - k_oligo2_AB42
      - V_BrainISF
    evidence:
      - source: "Elbert noSILK 1c reaction SecondaryOligomerization_AB42_BrainISF"
        supports: "Fibril-catalyzed AB42 oligomer generation"
    rate_law_evidence:
      - pmid: "24270810"
        source: "Cohen et al. 2013"
        supports: "Secondary nucleation term monomer^n2 * fibril"

  - name: DeOligomerization_AB42_BrainISF
    reactants:
      - AB42_oligomer_BrainISF
    products:
      - AB42_monomer_BrainISF
    rate_type: MA
    rate_parameters:
      - k_d1_Oligomer_AB42
    evidence:
      - source: "Elbert noSILK 1c reaction DeOligomerization_AB42_BrainISF"
        supports: "Reversible oligomer pool"
    rate_law_evidence:
      - source: "Elbert parameter k_d1_Oligomer_AB42"
        supports: "First-order de-oligomerization"

  - name: SecondaryDeOligomerization_AB42_BrainISF
    reactants:
      - AB42_oligomer_BrainISF
    products:
      - AB42_monomer_BrainISF
    rate_type: custom_conc_per_time
    rate_equation: "k_d2_Oligomer_AB42 * (AB42_oligomer_BrainISF / V_BrainISF) * (AB42_fibril_BrainISF / V_BrainISF)"
    rate_parameters:
      - k_d2_Oligomer_AB42
      - V_BrainISF
    evidence:
      - source: "Elbert noSILK 1c reaction SecondaryDeOligomerization_AB42_BrainISF"
        supports: "Fibril-dependent AB42 oligomer disassembly"
    rate_law_evidence:
      - source: "Elbert parameter k_d2_Oligomer_AB42"
        supports: "Second-order oligomer-fibril de-oligomerization"

  - name: OligomerToProtofibril_AB42_BrainISF
    reactants:
      - AB42_oligomer_BrainISF
    products:
      - AB42_protofibril_BrainISF
    rate_type: MA
    rate_parameters:
      - k_c_AB42
    evidence:
      - source: "Elbert FibrilNumberFormation_AB42_BrainISF abstraction"
        supports: "Oligomer maturation toward fibrillar states"
    rate_law_evidence:
      - source: "Elbert parameter k_c_AB42"
        supports: "Conversion rate from oligomer to fibril precursor"

  - name: ProtofibrilToOligomer_AB42_BrainISF
    reactants:
      - AB42_protofibril_BrainISF
    products:
      - AB42_oligomer_BrainISF
    rate_type: MA
    rate_parameters:
      - k_proto_back_AB42
    evidence:
      - source: "Tier-1 reversible aggregation closure"
        supports: "Protofibril reversibility"
    rate_law_evidence:
      - source: "Estimated from oligomer off-pathway dynamics"
        supports: "First-order back-conversion"

  - name: FibrilMassIncreaseFromProto_AB42_BrainISF
    reactants:
      - AB42_monomer_BrainISF
      - AB42_protofibril_BrainISF
    products:
      - AB42_fibril_BrainISF
    rate_type: custom_conc_per_time
    rate_equation: "2 * k_plus_AB42 * (AB42_monomer_BrainISF / V_BrainISF) * (AB42_protofibril_BrainISF / V_BrainISF)"
    rate_parameters:
      - k_plus_AB42
      - V_BrainISF
    evidence:
      - source: "Elbert FibrilMassIncrease_AB42_BrainISF mapped to explicit protofibril species"
        supports: "Monomer addition drives fibril mass increase"
    rate_law_evidence:
      - pmid: "22406560"
        source: "Cohen et al. 2012"
        supports: "dM/dt proportional to elongation constant and monomer*seed"

  - name: FibrilMassIncreaseFromFibrilTemplate_AB42_BrainISF
    reactants:
