    confidence: assumed
    source: "Hill nonlinearity for phase gating."

  - name: K_inh_orexin_on_melatonin
    value: 4.0e-08
    units: mol/L
    confidence: assumed
    source: "Reciprocal sleep/wake antagonism abstraction."

  - name: k_deg_melatonin
    value: 3.5e-01
    units: 1/hr
    confidence: estimated
    source: "Melatonin short half-life timescale abstraction."

  - name: k_syn_orexin_max
    value: 3.0e-06
    units: mol/L/hr
    confidence: estimated
    source: "Wake-drive orexin production abstraction."

  - name: K_act_CLOCK_BMAL1_on_orexin
    value: 1.0e-07
    units: mol/L
    confidence: assumed
    source: "Tier 4 exploratory scaling."

  - name: K_inh_melatonin_on_orexin
    value: 5.0e-08
    units: mol/L
    confidence: assumed
    source: "Reciprocal sleep/wake antagonism abstraction."

  - name: K_inh_REV_on_orexin
    value: 7.0e-08
    units: mol/L
    confidence: assumed
    source: "Clock-output repression coupling (exploratory)."

  - name: k_deg_orexin
    value: 1.2e-01
    units: 1/hr
    confidence: estimated
    source: "Orexin turnover timescale abstraction."

  - name: Q_glymph_base
    value: 8.101366791213009e-03
    units: L/hr
    confidence: estimated
    source: "Elbert_Esguerra_model_v2026b antimony parameter Q_glymph (Antimony_elbert_Esguerra_noSILK_1a_parameters.txt)."

  - name: alpha_melatonin_glymph
    value: 1.2
    units: dimensionless
    confidence: assumed
    source: "Sleep-associated glymphatic enhancement abstraction."

  - name: alpha_orexin_glymph
    value: 6.0e-01
    units: dimensionless
    confidence: assumed
    source: "Wake-associated glymphatic suppression abstraction."

  - name: K_melatonin_glymph
    value: 5.0e-08
    units: mol/L
    confidence: assumed
    source: "Tier 4 exploratory sensitivity scale."

  - name: K_orexin_glymph
    value: 5.0e-08
    units: mol/L
    confidence: assumed
    source: "Tier 4 exploratory sensitivity scale."

rules:
  - name: GlymphaticFlowAssignment
    equation: "glymphatic_flow_rate_BrainISF = Q_glymph_base * (1 + alpha_melatonin_glymph * ((melatonin_Neuron / V_Neuron) / (K_melatonin_glymph + (melatonin_Neuron / V_Neuron))) - alpha_orexin_glymph * ((orexin_Neuron / V_Neuron) / (K_orexin_glymph + (orexin_Neuron / V_Neuron))))"
    notes: "Expose dynamic glymphatic flow output for downstream AB clearance coupling."

evidence:
  - doi: "10.1038/nrg.2016.150"
    source: "Takahashi JS. Transcriptional architecture of the mammalian circadian clock."
    supports: "Core TTFL structure using BMAL1/CLOCK activation and PER/CRY/REV feedback motifs."
  - doi: "10.1126/science.1241224"
    source: "Xie et al. Sleep drives metabolite clearance from the adult brain."
    supports: "Sleep-linked increase in interstitial clearance motivates glymphatic modulation output."
  - source: "Elbert_Esguerra_model_v2026b/antimony_models/Antimony_elbert_Esguerra_noSILK_1a_parameters.txt"
    snippet: "Q_glymph = 0.008101366791213009"
    supports: "Baseline glymphatic flow scale used for Q_glymph_base."
