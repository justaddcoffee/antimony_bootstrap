name: synaptic_dysfunction
description: >
  Tier 2 synaptic dysfunction module for Alzheimer's disease ODE models.
  Captures AB42 oligomer-driven synapse loss, BDNF-TrkB-CREB-ARC signaling,
  AMPAR/NMDAR receptor trafficking, glutamatergic stress, and LTP/LTD balance
  in Synapse and Neuron compartments.
mechanism: "Synaptic Dysfunction"
notes: "Tier: 2. Compartments constrained to Synapse and Neuron."

compartments:
  - name: Synapse
    volume_parameter: V_Synapse
    volume_value: 0.0001
    volume_units: L
    notes: "Synaptic microenvironment (cleft + postsynaptic density proxy)."
  - name: Neuron
    volume_parameter: V_Neuron
    volume_value: 0.0005
    volume_units: L
    notes: "Intraneuronal signaling compartment coupled to synaptic state."

species:
  - name: SYNAPSE_density_Synapse
    initial_amount: 8.0e-10
    units: mol
  - name: PSD95_Synapse
    initial_amount: 2.0e-9
    units: mol
  - name: AMPAR_Synapse
    initial_amount: 3.0e-9
    units: mol
  - name: NMDAR_Synapse
    initial_amount: 1.5e-9
    units: mol
  - name: BDNF_Synapse
    initial_amount: 1.2e-10
    units: mol
  - name: TrkB_Synapse
    initial_amount: 4.0e-10
    units: mol
  - name: glutamate_syn_Synapse
    initial_amount: 2.0e-9
    units: mol
  - name: CREB_Neuron
    initial_amount: 2.0e-10
    units: mol
  - name: ARC_Neuron
    initial_amount: 2.0e-10
    units: mol
  - name: LTP_Synapse
    initial_amount: 6.0e-10
    units: mol
  - name: LTD_Synapse
    initial_amount: 2.0e-10
    units: mol
  - name: AB42o_Synapse
    initial_amount: 1.0e-10
    units: mol
  - name: AMPAR_endo_Neuron
    initial_amount: 5.0e-10
    units: mol
  - name: CaMKII_active_Neuron
    initial_amount: 2.5e-10
    units: mol
  - name: Calcineurin_active_Neuron
    initial_amount: 1.5e-10
    units: mol

reactions:
  - name: AB42o_Input
    reactants: []
    products:
      - AB42o_Synapse
    rate_type: MA
    rate_parameters:
      - k_ab42o_input

  - name: AB42o_Clearance
    reactants:
      - AB42o_Synapse
    products: []
    rate_type: MA
    rate_parameters:
      - k_ab42o_clear

  - name: Glutamate_Release
    reactants: []
    products:
      - glutamate_syn_Synapse
    rate_type: custom_conc_per_time
    rate_equation: "k_glu_release * (1 + alpha_activity_LTP * (LTP_Synapse / V_Synapse))"
    rate_parameters:
      - k_glu_release
      - alpha_activity_LTP
      - V_Synapse

  - name: Glutamate_Clearance
    reactants:
      - glutamate_syn_Synapse
    products: []
    rate_type: MA
    rate_parameters:
      - k_glu_clear

  - name: BDNF_Production_by_CREB
    reactants: []
    products:
      - BDNF_Synapse
    rate_type: custom_conc_per_time
    rate_equation: "k_bdnf_prod * ((CREB_Neuron / V_Neuron) / (K_CREB_BDNF + (CREB_Neuron / V_Neuron)))"
    rate_parameters:
      - k_bdnf_prod
      - K_CREB_BDNF
      - V_Neuron

  - name: BDNF_Degradation
    reactants:
      - BDNF_Synapse
    products: []
    rate_type: MA
    rate_parameters:
      - k_bdnf_deg

  - name: TrkB_Activation_by_BDNF
    reactants: []
    products:
      - TrkB_Synapse
    rate_type: custom_conc_per_time
    rate_equation: "k_trkb_act * ((BDNF_Synapse / V_Synapse) / (K_BDNF_TrkB + (BDNF_Synapse / V_Synapse))) * (TrkB_capacity - (TrkB_Synapse / V_Synapse))"
    rate_parameters:
      - k_trkb_act
      - K_BDNF_TrkB
      - TrkB_capacity
      - V_Synapse

  - name: TrkB_Deactivation
    reactants:
      - TrkB_Synapse
    products: []
    rate_type: MA
    rate_parameters:
      - k_trkb_deact

  - name: CREB_Activation_by_TrkB_CaMKII
    reactants: []
    products:
      - CREB_Neuron
    rate_type: custom_conc_per_time
    rate_equation: "k_creb_act * ((TrkB_Synapse / V_Synapse) / (K_TrkB_CREB + (TrkB_Synapse / V_Synapse))) * ((CaMKII_active_Neuron / V_Neuron) / (K_CaMKII_CREB + (CaMKII_active_Neuron / V_Neuron))) * (CREB_capacity - (CREB_Neuron / V_Neuron))"
    rate_parameters:
      - k_creb_act
      - K_TrkB_CREB
      - K_CaMKII_CREB
      - CREB_capacity
      - V_Synapse
      - V_Neuron

  - name: CREB_Deactivation_by_Calcineurin
    reactants:
      - CREB_Neuron
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "k_creb_deact * (CREB_Neuron / V_Neuron) * (1 + alpha_calcineurin_CREB * (Calcineurin_active_Neuron / V_Neuron))"
    rate_parameters:
      - k_creb_deact
      - alpha_calcineurin_CREB
      - V_Neuron

  - name: ARC_Expression_by_CREB
    reactants: []
    products:
      - ARC_Neuron
    rate_type: custom_conc_per_time
    rate_equation: "k_arc_prod * ((CREB_Neuron / V_Neuron) / (K_CREB_ARC + (CREB_Neuron / V_Neuron)))"
    rate_parameters:
      - k_arc_prod
      - K_CREB_ARC
      - V_Neuron

  - name: ARC_Degradation
    reactants:
      - ARC_Neuron
    products: []
    rate_type: MA
    rate_parameters:
      - k_arc_deg

  - name: PSD95_Synthesis_by_CREB_ARC
    reactants: []
    products:
      - PSD95_Synapse
    rate_type: custom_conc_per_time
    rate_equation: "k_psd95_syn * ((CREB_Neuron / V_Neuron) / (K_CREB_PSD95 + (CREB_Neuron / V_Neuron))) * ((ARC_Neuron / V_Neuron) / (K_ARC_PSD95 + (ARC_Neuron / V_Neuron)))"
    rate_parameters:
      - k_psd95_syn
      - K_CREB_PSD95
      - K_ARC_PSD95
      - V_Neuron

  - name: PSD95_Degradation_by_AB42
    reactants:
      - PSD95_Synapse
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "k_psd95_deg_ab42 * (PSD95_Synapse / V_Synapse) * ((AB42o_Synapse / V_Synapse) / (K_AB42_PSD95 + (AB42o_Synapse / V_Synapse)))"
    rate_parameters:
      - k_psd95_deg_ab42
      - K_AB42_PSD95
      - V_Synapse

  - name: AMPAR_Synthesis_by_ARC_PSD95
    reactants: []
    products:
      - AMPAR_Synapse
    rate_type: custom_conc_per_time
    rate_equation: "k_ampar_insert * ((ARC_Neuron / V_Neuron) / (K_ARC_AMPAR + (ARC_Neuron / V_Neuron))) * ((PSD95_Synapse / V_Synapse) / (K_PSD95_AMPAR + (PSD95_Synapse / V_Synapse)))"
    rate_parameters:
      - k_ampar_insert
      - K_ARC_AMPAR
      - K_PSD95_AMPAR
      - V_Neuron
      - V_Synapse

  - name: AMPAR_Endocytosis_by_AB42
    reactants:
      - AMPAR_Synapse
    products:
      - AMPAR_endo_Neuron
    rate_type: custom_conc_per_time
    rate_equation: "k_ampar_endo * (AMPAR_Synapse / V_Synapse) * ((AB42o_Synapse / V_Synapse) / (K_AB42_AMPAR_endo + (AB42o_Synapse / V_Synapse))) * (1 + alpha_glu_AMPAR_endo * (glutamate_syn_Synapse / V_Synapse))"
    rate_parameters:
      - k_ampar_endo
      - K_AB42_AMPAR_endo
      - alpha_glu_AMPAR_endo
      - V_Synapse

  - name: AMPAR_Recycling
    reactants:
      - AMPAR_endo_Neuron
    products:
      - AMPAR_Synapse
    rate_type: MA
    rate_parameters:
      - k_ampar_recycle

  - name: AMPAR_Endosomal_Degradation
    reactants:
      - AMPAR_endo_Neuron
    products: []
    rate_type: MA
    rate_parameters:
      - k_ampar_endo_deg

  - name: NMDAR_Synthesis_by_PSD95
    reactants: []
    products:
      - NMDAR_Synapse
    rate_type: custom_conc_per_time
    rate_equation: "k_nmdar_syn * ((PSD95_Synapse / V_Synapse) / (K_PSD95_NMDAR + (PSD95_Synapse / V_Synapse)))"
    rate_parameters:
      - k_nmdar_syn
      - K_PSD95_NMDAR
      - V_Synapse

  - name: NMDAR_Internalization_by_AB42
    reactants:
      - NMDAR_Synapse
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "k_nmdar_int * (NMDAR_Synapse / V_Synapse) * ((AB42o_Synapse / V_Synapse) / (K_AB42_NMDAR_int + (AB42o_Synapse / V_Synapse)))"
    rate_parameters:
      - k_nmdar_int
      - K_AB42_NMDAR_int
      - V_Synapse

  - name: CaMKII_Activation_by_Glutamate_NMDAR
    reactants: []
    products:
      - CaMKII_active_Neuron
    rate_type: custom_conc_per_time
    rate_equation: "k_camkii_act * (((glutamate_syn_Synapse / V_Synapse)^2) / (K_glu_camkii^2 + (glutamate_syn_Synapse / V_Synapse)^2)) * ((NMDAR_Synapse / V_Synapse) / (K_NMDAR_camkii + (NMDAR_Synapse / V_Synapse))) * (CaMKII_capacity - (CaMKII_active_Neuron / V_Neuron))"
    rate_parameters:
      - k_camkii_act
      - K_glu_camkii
      - K_NMDAR_camkii
      - CaMKII_capacity
      - V_Synapse
      - V_Neuron

  - name: CaMKII_Deactivation
    reactants:
      - CaMKII_active_Neuron
    products: []
    rate_type: MA
    rate_parameters:
      - k_camkii_deact

  - name: Calcineurin_Activation_by_AB42_NMDAR
    reactants: []
    products:
      - Calcineurin_active_Neuron
    rate_type: custom_conc_per_time
    rate_equation: "k_calcineurin_act * ((AB42o_Synapse / V_Synapse) / (K_AB42_calcineurin + (AB42o_Synapse / V_Synapse))) * ((NMDAR_Synapse / V_Synapse) / (K_NMDAR_calcineurin + (NMDAR_Synapse / V_Synapse))) * (Calcineurin_capacity - (Calcineurin_active_Neuron / V_Neuron))"
    rate_parameters:
      - k_calcineurin_act
      - K_AB42_calcineurin
      - K_NMDAR_calcineurin
      - Calcineurin_capacity
      - V_Synapse
      - V_Neuron

  - name: Calcineurin_Deactivation
    reactants:
      - Calcineurin_active_Neuron
    products: []
    rate_type: MA
    rate_parameters:
      - k_calcineurin_deact

  - name: LTP_Induction
    reactants: []
    products:
      - LTP_Synapse
    rate_type: custom_conc_per_time
    rate_equation: "k_ltp * ((CaMKII_active_Neuron / V_Neuron) / (K_CaMKII_LTP + (CaMKII_active_Neuron / V_Neuron))) * ((AMPAR_Synapse / V_Synapse) / (K_AMPAR_LTP + (AMPAR_Synapse / V_Synapse))) * (LTP_capacity - (LTP_Synapse / V_Synapse))"
    rate_parameters:
      - k_ltp
      - K_CaMKII_LTP
      - K_AMPAR_LTP
      - LTP_capacity
      - V_Neuron
      - V_Synapse

  - name: LTP_Decay
    reactants:
      - LTP_Synapse
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "k_ltp_decay * (LTP_Synapse / V_Synapse) * (1 + alpha_AB42_LTP_decay * (AB42o_Synapse / V_Synapse))"
    rate_parameters:
      - k_ltp_decay
      - alpha_AB42_LTP_decay
      - V_Synapse

  - name: LTD_Induction
    reactants: []
    products:
      - LTD_Synapse
    rate_type: custom_conc_per_time
    rate_equation: "k_ltd * ((Calcineurin_active_Neuron / V_Neuron) / (K_Calcineurin_LTD + (Calcineurin_active_Neuron / V_Neuron))) * ((AB42o_Synapse / V_Synapse) / (K_AB42_LTD + (AB42o_Synapse / V_Synapse))) * (LTD_capacity - (LTD_Synapse / V_Synapse))"
    rate_parameters:
      - k_ltd
      - K_Calcineurin_LTD
      - K_AB42_LTD
      - LTD_capacity
      - V_Neuron
      - V_Synapse

  - name: LTD_Decay
    reactants:
      - LTD_Synapse
    products: []
    rate_type: MA
    rate_parameters:
      - k_ltd_decay

  - name: Synapse_Elimination_by_AB42_LTD
    reactants:
      - SYNAPSE_density_Synapse
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "k_synapse_elim * (SYNAPSE_density_Synapse / V_Synapse) * ((AB42o_Synapse / V_Synapse) / (K_AB42_synaptotoxic + (AB42o_Synapse / V_Synapse))) * (1 + alpha_LTD_synapse * (LTD_Synapse / V_Synapse))"
    rate_parameters:
      - k_synapse_elim
      - K_AB42_synaptotoxic
      - alpha_LTD_synapse
      - V_Synapse

  - name: Synapse_Recovery_by_BDNF_LTP
    reactants: []
    products:
      - SYNAPSE_density_Synapse
    rate_type: custom_conc_per_time
    rate_equation: "k_synapse_recover * ((BDNF_Synapse / V_Synapse) / (K_BDNF_synapse + (BDNF_Synapse / V_Synapse))) * ((LTP_Synapse / V_Synapse) / (K_LTP_synapse + (LTP_Synapse / V_Synapse))) * (SYNAPSE_capacity - (SYNAPSE_density_Synapse / V_Synapse))"
    rate_parameters:
      - k_synapse_recover
      - K_BDNF_synapse
      - K_LTP_synapse
      - SYNAPSE_capacity
      - V_Synapse

