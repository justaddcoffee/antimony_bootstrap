name: neuroinflammation_microglia
description: >
  Tier 2 neuroinflammation microglia module for Alzheimer's disease ODE models.
  Captures microglial state transitions (resting, M1, M2, DAM), TREM2-SYK/CD33
  signaling, cytokine production and degradation, fractalkine signaling, and
  microglia-mediated phagocytosis.
mechanism: "Neuroinflammation"
notes: "Tier: 2. Compartments constrained to Microglia and BrainISF. TGFbeta represented as TGFB."

compartments:
  - name: Microglia
    volume_parameter: V_Microglia
    volume_value: 1.0
    volume_units: L
    notes: "Lumped effective microglia compartment for state and receptor dynamics."
  - name: BrainISF
    volume_parameter: V_BrainISF
    volume_value: 0.25
    volume_units: L
    notes: "Interstitial fluid compartment for cytokines and amyloid burden signals."

species:
  - name: MICROGLIA_resting_Microglia
    initial_amount: 1.0
    units: cell_equiv
  - name: MICROGLIA_M1_Microglia
    initial_amount: 0.05
    units: cell_equiv
  - name: MICROGLIA_M2_Microglia
    initial_amount: 0.03
    units: cell_equiv
  - name: MICROGLIA_DAM_Microglia
    initial_amount: 0.02
    units: cell_equiv
  - name: TREM2_Microglia
    initial_amount: 1.0e-9
    units: mol
  - name: TREM2_active_Microglia
    initial_amount: 0.1e-9
    units: mol
  - name: CD33_Microglia
    initial_amount: 0.3e-9
    units: mol
  - name: SYK_inactive_Microglia
    initial_amount: 1.0e-9
    units: mol
  - name: SYK_active_Microglia
    initial_amount: 0.1e-9
    units: mol
  - name: CX3CR1_Microglia
    initial_amount: 0.8e-9
    units: mol
  - name: TNFA_BrainISF
    initial_amount: 0.01e-9
    units: mol
  - name: IL1B_BrainISF
    initial_amount: 0.005e-9
    units: mol
  - name: IL6_BrainISF
    initial_amount: 0.01e-9
    units: mol
  - name: IL10_BrainISF
    initial_amount: 0.02e-9
    units: mol
  - name: TGFB_BrainISF
    initial_amount: 0.03e-9
    units: mol
  - name: BDNF_BrainISF
    initial_amount: 0.05e-9
    units: mol
  - name: CX3CL1_BrainISF
    initial_amount: 0.08e-9
    units: mol
  - name: AB42_oligomer_BrainISF
    initial_amount: 0.2e-9
    units: mol
  - name: AB_plaque_BrainISF
    initial_amount: 0.15e-9
    units: mol
  - name: Debris_BrainISF
    initial_amount: 0.2e-9
    units: mol

reactions:
  - name: RestingBirth_Microglia
    reactants: []
    products:
      - MICROGLIA_resting_Microglia
    rate_type: MA
    rate_parameters:
      - k_resting_birth

  - name: RestingTurnover_Microglia
    reactants:
      - MICROGLIA_resting_Microglia
    products: []
    rate_type: MA
    rate_parameters:
      - k_resting_turnover

  - name: M1Turnover_Microglia
    reactants:
      - MICROGLIA_M1_Microglia
    products: []
    rate_type: MA
    rate_parameters:
      - k_M1_turnover

  - name: M2Turnover_Microglia
    reactants:
      - MICROGLIA_M2_Microglia
    products: []
    rate_type: MA
    rate_parameters:
      - k_M2_turnover

  - name: DAMTurnover_Microglia
    reactants:
      - MICROGLIA_DAM_Microglia
    products: []
    rate_type: MA
    rate_parameters:
      - k_DAM_turnover

  - name: RestingToM1_by_AB42_TNFA
    reactants:
      - MICROGLIA_resting_Microglia
    products:
      - MICROGLIA_M1_Microglia
    rate_type: custom_conc_per_time
    rate_equation: "k_resting_to_M1 * MICROGLIA_resting_Microglia * (AB42_oligomer_BrainISF / (K_AB42_M1 + AB42_oligomer_BrainISF)) * (1 + amp_TNFA_M1 * TNFA_BrainISF / (K_TNFA_M1 + TNFA_BrainISF))"
    rate_parameters:
      - k_resting_to_M1
      - K_AB42_M1
      - amp_TNFA_M1
      - K_TNFA_M1

  - name: RestingToM2_by_IL10_TGFB
    reactants:
      - MICROGLIA_resting_Microglia
    products:
      - MICROGLIA_M2_Microglia
    rate_type: custom_conc_per_time
    rate_equation: "k_resting_to_M2 * MICROGLIA_resting_Microglia * (IL10_BrainISF / (K_IL10_M2 + IL10_BrainISF)) * (TGFB_BrainISF / (K_TGFB_M2 + TGFB_BrainISF))"
    rate_parameters:
      - k_resting_to_M2
      - K_IL10_M2
      - K_TGFB_M2

  - name: RestingToDAM_by_AB42
    reactants:
      - MICROGLIA_resting_Microglia
    products:
      - MICROGLIA_DAM_Microglia
    rate_type: custom_conc_per_time
    rate_equation: "k_resting_to_DAM * MICROGLIA_resting_Microglia * (AB42_oligomer_BrainISF / (K_AB42_DAM + AB42_oligomer_BrainISF))"
    rate_parameters:
      - k_resting_to_DAM
      - K_AB42_DAM

  - name: DAMToM1_by_CD33
    reactants:
      - MICROGLIA_DAM_Microglia
    products:
      - MICROGLIA_M1_Microglia
    rate_type: custom_conc_per_time
    rate_equation: "k_DAM_to_M1 * MICROGLIA_DAM_Microglia * (CD33_Microglia / (K_CD33_DAM + CD33_Microglia))"
    rate_parameters:
      - k_DAM_to_M1
      - K_CD33_DAM

  - name: M1ToM2_by_IL10
    reactants:
      - MICROGLIA_M1_Microglia
    products:
      - MICROGLIA_M2_Microglia
    rate_type: custom_conc_per_time
    rate_equation: "k_M1_to_M2 * MICROGLIA_M1_Microglia * (IL10_BrainISF / (K_IL10_resolve + IL10_BrainISF))"
    rate_parameters:
      - k_M1_to_M2
      - K_IL10_resolve

  - name: M2ToResting
    reactants:
      - MICROGLIA_M2_Microglia
    products:
      - MICROGLIA_resting_Microglia
    rate_type: MA
    rate_parameters:
      - k_M2_to_resting

  - name: M1ToResting_by_IL10
    reactants:
      - MICROGLIA_M1_Microglia
    products:
      - MICROGLIA_resting_Microglia
    rate_type: custom_conc_per_time
    rate_equation: "k_M1_to_resting * MICROGLIA_M1_Microglia * (IL10_BrainISF / (K_IL10_resting + IL10_BrainISF))"
    rate_parameters:
      - k_M1_to_resting
      - K_IL10_resting

  - name: DAMToResting
    reactants:
      - MICROGLIA_DAM_Microglia
    products:
      - MICROGLIA_resting_Microglia
    rate_type: MA
    rate_parameters:
      - k_DAM_to_resting

  - name: TREM2Synthesis
    reactants: []
    products:
      - TREM2_Microglia
    rate_type: MA
    rate_parameters:
      - k_TREM2_syn

  - name: TREM2Degradation
    reactants:
      - TREM2_Microglia
    products: []
    rate_type: MA
    rate_parameters:
      - k_TREM2_deg

  - name: TREM2Activation_by_AB42
    reactants:
      - TREM2_Microglia
    products:
      - TREM2_active_Microglia
    rate_type: custom_conc_per_time
    rate_equation: "k_TREM2_act * TREM2_Microglia * (AB42_oligomer_BrainISF / (K_AB42_TREM2 + AB42_oligomer_BrainISF))"
    rate_parameters:
      - k_TREM2_act
      - K_AB42_TREM2

  - name: TREM2Inactivation
    reactants:
      - TREM2_active_Microglia
    products:
      - TREM2_Microglia
    rate_type: MA
    rate_parameters:
      - k_TREM2_inact

  - name: SYKActivation_by_TREM2
    reactants:
      - SYK_inactive_Microglia
    products:
      - SYK_active_Microglia
    rate_type: custom_conc_per_time
    rate_equation: "k_SYK_act * SYK_inactive_Microglia * (TREM2_active_Microglia / (K_TREM2_SYK + TREM2_active_Microglia))"
    rate_parameters:
      - k_SYK_act
      - K_TREM2_SYK

  - name: SYKInactivation
    reactants:
      - SYK_active_Microglia
    products:
      - SYK_inactive_Microglia
    rate_type: MA
    rate_parameters:
      - k_SYK_inact

  - name: CD33Mediated_TREM2Suppression
    reactants:
      - TREM2_active_Microglia
    products:
      - TREM2_Microglia
    rate_type: custom_conc_per_time
    rate_equation: "k_CD33_TREM2_suppress * TREM2_active_Microglia * (CD33_Microglia / (K_CD33_TREM2 + CD33_Microglia))"
    rate_parameters:
      - k_CD33_TREM2_suppress
      - K_CD33_TREM2

  - name: CD33Synthesis
    reactants: []
    products:
      - CD33_Microglia
    rate_type: MA
    rate_parameters:
      - k_CD33_syn

  - name: CD33Degradation
    reactants:
      - CD33_Microglia
    products: []
    rate_type: MA
    rate_parameters:
      - k_CD33_deg

  - name: CX3CR1Synthesis
    reactants: []
    products:
      - CX3CR1_Microglia
    rate_type: MA
    rate_parameters:
      - k_CX3CR1_syn

  - name: CX3CR1Degradation
    reactants:
      - CX3CR1_Microglia
    products: []
    rate_type: MA
    rate_parameters:
      - k_CX3CR1_deg

  - name: M1ToM2_by_CX3CL1_CX3CR1
    reactants:
      - MICROGLIA_M1_Microglia
    products:
      - MICROGLIA_M2_Microglia
    rate_type: custom_conc_per_time
    rate_equation: "k_M1_to_M2_CX3 * MICROGLIA_M1_Microglia * (CX3CL1_BrainISF / (K_CX3CL1 + CX3CL1_BrainISF)) * (CX3CR1_Microglia / (K_CX3CR1 + CX3CR1_Microglia))"
    rate_parameters:
      - k_M1_to_M2_CX3
      - K_CX3CL1
      - K_CX3CR1

  - name: TNFAProduction_by_M1
    reactants: []
    products:
      - TNFA_BrainISF
    rate_type: custom_conc_per_time
    rate_equation: "k_prod_TNFA * MICROGLIA_M1_Microglia * (1 / (1 + IL10_BrainISF / Ki_IL10_TNFA))"
    rate_parameters:
      - k_prod_TNFA
      - Ki_IL10_TNFA

  - name: IL1BProduction_by_M1
    reactants: []
    products:
      - IL1B_BrainISF
    rate_type: custom_conc_per_time
    rate_equation: "k_prod_IL1B * MICROGLIA_M1_Microglia * (1 / (1 + IL10_BrainISF / Ki_IL10_IL1B))"
    rate_parameters:
      - k_prod_IL1B
      - Ki_IL10_IL1B

  - name: IL6Production_by_M1
    reactants: []
    products:
      - IL6_BrainISF
    rate_type: custom_conc_per_time
    rate_equation: "k_prod_IL6 * MICROGLIA_M1_Microglia"
    rate_parameters:
      - k_prod_IL6

  - name: IL10Production_by_M2_DAM
    reactants: []
    products:
      - IL10_BrainISF
    rate_type: custom_conc_per_time
    rate_equation: "k_prod_IL10_M2 * MICROGLIA_M2_Microglia + k_prod_IL10_DAM * MICROGLIA_DAM_Microglia"
    rate_parameters:
      - k_prod_IL10_M2
      - k_prod_IL10_DAM

  - name: TGFBProduction_by_M2
    reactants: []
    products:
      - TGFB_BrainISF
    rate_type: custom_conc_per_time
    rate_equation: "k_prod_TGFB * MICROGLIA_M2_Microglia"
    rate_parameters:
      - k_prod_TGFB

  - name: BDNFProduction_by_M2
    reactants: []
    products:
      - BDNF_BrainISF
    rate_type: custom_conc_per_time
    rate_equation: "k_prod_BDNF * MICROGLIA_M2_Microglia"
    rate_parameters:
      - k_prod_BDNF

  - name: TNFAAutoAmplification
    reactants: []
    products:
      - TNFA_BrainISF
    rate_type: custom_conc_per_time
    rate_equation: "k_auto_TNFA * (TNFA_BrainISF^n_auto_TNFA) / (K_auto_TNFA^n_auto_TNFA + TNFA_BrainISF^n_auto_TNFA)"
    rate_parameters:
      - k_auto_TNFA
      - n_auto_TNFA
      - K_auto_TNFA

  - name: TNFADegradation
    reactants:
      - TNFA_BrainISF
    products: []
    rate_type: MA
    rate_parameters:
      - k_deg_TNFA

  - name: IL1BDegradation
    reactants:
      - IL1B_BrainISF
    products: []
    rate_type: MA
    rate_parameters:
      - k_deg_IL1B

  - name: IL6Degradation
    reactants:
      - IL6_BrainISF
    products: []
    rate_type: MA
    rate_parameters:
      - k_deg_IL6

  - name: IL10Degradation
    reactants:
      - IL10_BrainISF
    products: []
    rate_type: MA
    rate_parameters:
      - k_deg_IL10

  - name: TGFBDegradation
    reactants:
      - TGFB_BrainISF
    products: []
    rate_type: MA
    rate_parameters:
      - k_deg_TGFB

  - name: BDNFDegradation
    reactants:
      - BDNF_BrainISF
    products: []
    rate_type: MA
    rate_parameters:
      - k_deg_BDNF

  - name: CX3CL1Synthesis
    reactants: []
    products:
      - CX3CL1_BrainISF
    rate_type: MA
    rate_parameters:
      - k_CX3CL1_syn

  - name: CX3CL1Degradation
    reactants:
      - CX3CL1_BrainISF
    products: []
    rate_type: MA
    rate_parameters:
      - k_CX3CL1_deg

  - name: AB42OligomerPhagocytosis_by_M2_DAM
    reactants:
      - AB42_oligomer_BrainISF
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "k_phago_AB42 * (AB42_oligomer_BrainISF / V_BrainISF) * (MICROGLIA_M2_Microglia + phi_DAM_AB42 * MICROGLIA_DAM_Microglia) * (1 + alpha_TREM2_phago * TREM2_active_Microglia / (K_TREM2_phago + TREM2_active_Microglia))"
    rate_parameters:
      - k_phago_AB42
      - phi_DAM_AB42
      - alpha_TREM2_phago
      - K_TREM2_phago
      - V_BrainISF

  - name: PlaquePhagocytosis_by_DAM
    reactants:
      - AB_plaque_BrainISF
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "k_phago_plaque * (AB_plaque_BrainISF / V_BrainISF) * MICROGLIA_DAM_Microglia * (TREM2_active_Microglia / (K_TREM2_plaque + TREM2_active_Microglia))"
    rate_parameters:
      - k_phago_plaque
      - K_TREM2_plaque
      - V_BrainISF

  - name: DebrisClearance_by_Microglia
    reactants:
      - Debris_BrainISF
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "k_clear_debris * (Debris_BrainISF / V_BrainISF) * (MICROGLIA_resting_Microglia + 1.5 * MICROGLIA_M2_Microglia + 2.0 * MICROGLIA_DAM_Microglia)"
    rate_parameters:
      - k_clear_debris
      - V_BrainISF

