    products: []
    rate_type: custom_conc_per_time
    rate_equation: "(Vmax_MMP9_AB40 * (MMP9_BrainISF / MMP9_ref_BrainISF) * (AB40_BrainISF / V_BrainISF)) / (Km_MMP9_AB40 + (AB40_BrainISF / V_BrainISF))"
