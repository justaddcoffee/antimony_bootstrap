        supports: "Michaelis-Menten form for NEP-mediated ABeta degradation"

  - name: NEP_Degradation_AB40_BrainISF
    reactants:
      - AB40_BrainISF
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "(Vmax_NEP_AB40 * (NEP_BrainISF / NEP_ref_BrainISF) * (AB40_BrainISF / V_BrainISF)) / (Km_NEP_AB40 + (AB40_BrainISF / V_BrainISF))"
