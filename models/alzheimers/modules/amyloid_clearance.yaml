rules:
  - name: ABeta_total_BrainISF
    equation: "ABeta_total_BrainISF = AB42_BrainISF + AB40_BrainISF"
    notes: "Convenience observable for ISF amyloid burden."
  - name: ABeta_total_Perivascular
    equation: "ABeta_total_Perivascular = AB42_Perivascular + AB40_Perivascular"
    notes: "Convenience observable for perivascular drainage burden."
  - name: Microglia_total
    equation: "Microglia_total = microglia_resting_Microglia + microglia_phagocytic_Microglia"
    notes: "State-partitioned microglia total in the tier-1 compartment."

evidence:
