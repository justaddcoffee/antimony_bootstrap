    evidence:
      - source: "Strategy amyloid cascade, section 4.1"
        supports: "MMP enzymes contribute to soluble amyloid clearance"
    rate_law_evidence:
      - source: "Tier-1 enzymatic extension"
        supports: "Michaelis-Menten form aligned with other protease-mediated pathways"

  - name: MMP9_Degradation_AB40_BrainISF
    reactants:
