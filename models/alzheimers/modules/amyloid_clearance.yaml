  - name: MicrogliaActivation_Resting_to_Phagocytic
    reactants:
      - microglia_resting_Microglia
    products:
      - microglia_phagocytic_Microglia
    rate_type: custom_conc_per_time
    rate_equation: "k_microglia_activation * (microglia_resting_Microglia / V_Microglia) * ((AB42_BrainISF / V_BrainISF)^hill_microglia_activation) / (Kact_microglia_AB42^hill_microglia_activation + (AB42_BrainISF / V_BrainISF)^hill_microglia_activation)"
    rate_parameters:
      - k_microglia_activation
      - hill_microglia_activation
      - Kact_microglia_AB42
      - V_Microglia
      - V_BrainISF
    evidence:
      - source: "Elbert 3a reaction family Microglia_Activation_*"
        supports: "State transition between microglia phenotypes"
    rate_law_evidence:
      - source: "amyloid_clearance parameter extraction"
        supports: "Hill coefficient support for nonlinear activation"

  - name: MicrogliaDeactivation_Phagocytic_to_Resting
    reactants:
      - microglia_phagocytic_Microglia
    products:
      - microglia_resting_Microglia
    rate_type: MA
    rate_parameters:
      - k_microglia_deactivation
    evidence:
      - source: "Tier-1 closure"
        supports: "Allows reversible microglial state dynamics"
    rate_law_evidence:
      - source: "Simplified immune-state turnover"
        supports: "First-order return to baseline"

  - name: MicrogliaPhagocytosis_AB42_BrainISF
    reactants:
      - AB42_BrainISF
    products:
      - AB42_Microglia
    rate_type: custom_conc_per_time
    rate_equation: "k_phago_AB42 * (microglia_phagocytic_Microglia / V_Microglia) * (AB42_BrainISF / V_BrainISF)"
    rate_parameters:
