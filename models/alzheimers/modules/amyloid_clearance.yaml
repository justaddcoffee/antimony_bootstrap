    rate_type: custom_conc_per_time
    rate_equation: "(Vmax_MMP9_AB42 * (MMP9_BrainISF / MMP9_ref_BrainISF) * (AB42_BrainISF / V_BrainISF)) / (Km_MMP9_AB42 + (AB42_BrainISF / V_BrainISF))"
    rate_parameters:
      - Vmax_MMP9_AB42
