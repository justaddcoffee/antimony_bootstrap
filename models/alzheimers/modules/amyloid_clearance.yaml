name: amyloid_clearance
description: >
  Tier 1 amyloid clearance module for Alzheimer's disease ODE models.
  Captures AB42/AB40 enzymatic degradation in BrainISF (IDE, NEP, MMP9),
  microglial phagocytic uptake and lysosomal degradation, perivascular drainage,
  ISF bulk flow, and LRP1-mediated perivascular efflux.
mechanism: "Amyloid Cascade"
notes: "Tier: 1 (core). Compartments constrained to BrainISF, Microglia, and Perivascular."

compartments:
  - name: BrainISF
    volume_parameter: V_BrainISF
    volume_value: 0.25
    volume_units: L
    notes: "Primary soluble amyloid compartment."
  - name: Microglia
    volume_parameter: V_Microglia
    volume_value: 0.01
    volume_units: L
    notes: "Lumped microglial compartment for phagocytic uptake and intracellular degradation."
  - name: Perivascular
    volume_parameter: V_Perivascular
    volume_value: 0.03
    volume_units: L
    notes: "Perivascular drainage pathway compartment."

species:
  - name: AB42_BrainISF
    initial_amount: 1.0e-9
    units: mol
  - name: AB40_BrainISF
    initial_amount: 2.0e-9
    units: mol
  - name: AB42_Perivascular
    initial_amount: 0.0
    units: mol
  - name: AB40_Perivascular
    initial_amount: 0.0
    units: mol
  - name: AB42_Microglia
    initial_amount: 0.0
    units: mol
  - name: AB40_Microglia
    initial_amount: 0.0
    units: mol
  - name: IDE_BrainISF
    initial_amount: 5.0e-10
    units: mol
  - name: NEP_BrainISF
    initial_amount: 5.0e-10
    units: mol
  - name: MMP9_BrainISF
    initial_amount: 2.0e-10
    units: mol
  - name: LRP1_Perivascular
    initial_amount: 1.0e-9
    units: mol
  - name: microglia_resting_Microglia
    initial_amount: 0.9
    units: a.u.
  - name: microglia_phagocytic_Microglia
    initial_amount: 0.1
    units: a.u.

reactions:
  - name: IDE_Degradation_AB42_BrainISF
    reactants:
      - AB42_BrainISF
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "(Vmax_IDE_AB42 * (IDE_BrainISF / IDE_ref_BrainISF) * (AB42_BrainISF / V_BrainISF)) / (Km_IDE_AB42 + (AB42_BrainISF / V_BrainISF))"
    rate_parameters:
      - Vmax_IDE_AB42
      - Km_IDE_AB42
      - IDE_ref_BrainISF
      - V_BrainISF
    evidence:
      - source: "Strategy amyloid cascade, section 4.3.3"
        supports: "IDE contributes to soluble Abeta degradation"
      - source: "Elbert 3a parameter IDE_Kcat_ISF_AB42"
        supports: "IDE-linked AB42 degradation motif"
    rate_law_evidence:
      - source: "Strategy amyloid cascade, section 4.3.3"
        supports: "Michaelis-Menten form for IDE-mediated ABeta degradation"

  - name: IDE_Degradation_AB40_BrainISF
    reactants:
      - AB40_BrainISF
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "(Vmax_IDE_AB40 * (IDE_BrainISF / IDE_ref_BrainISF) * (AB40_BrainISF / V_BrainISF)) / (Km_IDE_AB40 + (AB40_BrainISF / V_BrainISF))"
    rate_parameters:
      - Vmax_IDE_AB40
      - Km_IDE_AB40
      - IDE_ref_BrainISF
      - V_BrainISF
    evidence:
      - source: "Strategy amyloid cascade, section 4.3.3"
        supports: "IDE contributes to soluble Abeta degradation"
      - source: "Elbert 3a parameter IDE_Kcat_ISF_AB40"
        supports: "IDE-linked AB40 degradation motif"
    rate_law_evidence:
      - source: "Strategy amyloid cascade, section 4.3.3"
        supports: "Michaelis-Menten form for IDE-mediated ABeta degradation"

  - name: NEP_Degradation_AB42_BrainISF
    reactants:
      - AB42_BrainISF
    products: []
    rate_type: custom_conc_per_time
    rate_equation: "(Vmax_NEP_AB42 * (NEP_BrainISF / NEP_ref_BrainISF) * (AB42_BrainISF / V_BrainISF)) / (Km_NEP_AB42 + (AB42_BrainISF / V_BrainISF))"
    rate_parameters:
