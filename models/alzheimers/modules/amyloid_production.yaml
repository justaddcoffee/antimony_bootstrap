name: amyloid_production
description: >
  Tier 1 core amyloid production module for Alzheimer's disease ODE models.
  Captures APP synthesis, alpha/beta/gamma-secretase processing, CTF handling,
  AB40/AB42 generation, and local degradation in neuron and brain interstitial
  fluid compartments.
mechanism: "Amyloid Cascade"
notes: "Tier: 1 (core). Elbert EndoLysNeuron kinetics mapped to Neuron compartment."

compartments:
  - name: Neuron
    volume_parameter: V_Neuron
    volume_value: 0.5
    volume_units: L
    notes: "Mapped from Elbert intracellular APP processing space (EndoLysNeuron)."
  - name: BrainISF
    volume_parameter: V_BrainISF
    volume_value: 0.25
    volume_units: L
    notes: "Brain interstitial fluid receiving soluble APP fragments and AB peptides."

species:
  - name: APP_Neuron
    initial_amount: 1.0e-12
    units: mol
  - name: BACE1_Neuron
    initial_amount: 1.0
    units: mol
  - name: GAMMA_SECRETASE_Neuron
    initial_amount: 1.0
    units: mol
  - name: sAPPalpha_BrainISF
    initial_amount: 0.0
    units: mol
  - name: sAPPbeta_BrainISF
    initial_amount: 0.0
    units: mol
  - name: CTFalpha_Neuron
    initial_amount: 0.0
    units: mol
  - name: CTFbeta_Neuron
    initial_amount: 0.0
    units: mol
  - name: C83_Neuron
    initial_amount: 1.0e-12
    units: mol
  - name: C99_Neuron
    initial_amount: 1.0e-12
    units: mol
  - name: AB40_BrainISF
    initial_amount: 1.0e-9
    units: mol
  - name: AB42_BrainISF
    initial_amount: 1.0e-9
    units: mol
  - name: AICD_Neuron
    initial_amount: 0.0
    units: mol
  - name: p3_BrainISF
    initial_amount: 0.0
    units: mol

reactions:
  - name: APPSynthesis_Neuron
    reactants: []
    products:
      - APP_Neuron
    rate_type: MA
    rate_parameters:
      - k_APP
    evidence:
      - source: "Elbert 1a reaction APPSynthesis_BrainISF"
        snippet: "APPSynthesis_BrainISF : -> APP_BrainISF; k_APP*(1-(f_L)) * V_BrainISF"
        supports: "APP source term exists in reference model"
    rate_law_evidence:
      - source: "Elbert 1a parameter k_APP"
        snippet: "k_APP = 10.422765512677959"
        supports: "Mass-action production constant for APP synthesis"

  - name: APPDegradation_Neuron
    reactants:
      - APP_Neuron
    products: []
    rate_type: MA
    rate_parameters:
      - k_APP_deg
    evidence:
      - source: "Model completion assumption"
        snippet: "APP turnover included for bounded steady state"
        supports: "APP degradation sink"
    rate_law_evidence:
      - source: "Steady-state estimate"
        supports: "First-order APP decay approximation"

  - name: APP_AlphaCleavage_Neuron
    reactants:
      - APP_Neuron
    products:
      - sAPPalpha_BrainISF
      - C83_Neuron
    rate_type: custom_conc_per_time
    rate_equation: "(Vm_APP_C83 / Km_APP_C83) * (APP_Neuron / V_Neuron) / (1 + (APP_Neuron / V_Neuron) / Km_APP_C83 + (C99_Neuron / V_Neuron) / Km_C99_C83)"
    rate_parameters:
      - Vm_APP_C83
      - Km_APP_C83
      - Km_C99_C83
      - V_Neuron
    evidence:
      - source: "Elbert 1a reaction C83Synthesis_BrainISF"
        snippet: "C83Synthesis_BrainISF : APP_BrainISF -> C83_BrainISF + sAPPa_BrainISF; ..."
        supports: "Alpha-secretase processing of APP to C83 and sAPPalpha"
    rate_law_evidence:
      - source: "Elbert 1a C83Synthesis_BrainISF denominator structure"
        supports: "Michaelis-Menten-like form with APP and C99 competition"

  - name: APP_BetaCleavage_Neuron
    reactants:
      - APP_Neuron
    products:
      - sAPPbeta_BrainISF
      - C99_Neuron
    rate_type: custom_conc_per_time
    rate_equation: "(Vm_APP_C99 / Km_APP_C99) * (APP_Neuron / V_Neuron) / (1 + (APP_Neuron / V_Neuron) / Km_APP_C99) * (BACE1_Neuron / BACE1_ref)"
    rate_parameters:
      - Vm_APP_C99
      - Km_APP_C99
      - BACE1_ref
      - V_Neuron
    evidence:
      - source: "Elbert 1a reaction C99Synthesis_EndoLysNeuron"
        snippet: "C99Synthesis_EndoLysNeuron : APP_EndoLysNeuron -> C99_EndoLysNeuron + sAPPb_BrainISF; ..."
        supports: "Beta-secretase processing of APP to C99 and sAPPbeta"
    rate_law_evidence:
      - source: "Elbert 1a C99Synthesis_EndoLysNeuron"
        supports: "Michaelis-Menten substrate-saturation form for APP to C99"

  - name: C99_to_C83_Neuron
    reactants:
      - C99_Neuron
    products:
      - C83_Neuron
    rate_type: custom_conc_per_time
    rate_equation: "(Vm_C99_C83 / Km_C99_C83) * (C99_Neuron / V_Neuron) / (1 + (APP_Neuron / V_Neuron) / Km_APP_C83 + (C99_Neuron / V_Neuron) / Km_C99_C83)"
    rate_parameters:
      - Vm_C99_C83
      - Km_C99_C83
      - Km_APP_C83
      - V_Neuron
    evidence:
      - source: "Elbert 1a reaction C99toC83_BrainISF"
        snippet: "C99toC83_BrainISF : C99_BrainISF -> C83_BrainISF; ..."
        supports: "C99 conversion to C83 branch in reference model"
    rate_law_evidence:
      - source: "Elbert 1a C99toC83_BrainISF"
        supports: "Competitive Michaelis-Menten form with APP/C99 in denominator"

  - name: C83_to_p3_AICD_Neuron
    reactants:
      - C83_Neuron
    products:
      - p3_BrainISF
      - AICD_Neuron
    rate_type: custom_conc_per_time
    rate_equation: "(Vm_C83_p3 / Km_C83_p3) * (C83_Neuron / V_Neuron) / (1 + (C83_Neuron / V_Neuron) / Km_C83_p3 + (C99_Neuron / V_Neuron) / Km_C99_Abeta) * (GAMMA_SECRETASE_Neuron / GAMMA_SECRETASE_ref)"
    rate_parameters:
      - Vm_C83_p3
      - Km_C83_p3
      - Km_C99_Abeta
      - GAMMA_SECRETASE_ref
      - V_Neuron
    evidence:
      - source: "Elbert 1a reaction C83toP3_EndoLysNeuron"
        snippet: "C83toP3_EndoLysNeuron : C83_EndoLysNeuron -> p3_EndoLysNeuron; ..."
        supports: "Gamma-secretase cleavage of C83 into non-amyloidogenic products"
    rate_law_evidence:
      - source: "Elbert 1a C83toP3_EndoLysNeuron"
        supports: "Michaelis-Menten with C83/C99 competition and gamma-secretase dependence"

  - name: C99_to_AB40_AICD_Neuron
    reactants:
      - C99_Neuron
    products:
      - AB40_BrainISF
      - AICD_Neuron
    rate_type: custom_conc_per_time
    rate_equation: "(k_gammasec_AB40 / Km_C99_Abeta) * (C99_Neuron / V_Neuron) / (1 + (C83_Neuron / V_Neuron) / Km_C83_p3 + (C99_Neuron / V_Neuron) / Km_C99_Abeta) * (GAMMA_SECRETASE_Neuron / GAMMA_SECRETASE_ref)"
    rate_parameters:
      - k_gammasec_AB40
      - Km_C99_Abeta
      - Km_C83_p3
      - GAMMA_SECRETASE_ref
      - V_Neuron
    evidence:
      - source: "Elbert 1a reaction AB40Synthesis_BrainISF"
        snippet: "AB40Synthesis_BrainISF : C99_EndoLysNeuron -> AB40_BrainISF; ..."
        supports: "Gamma-secretase production of AB40 from C99"
    rate_law_evidence:
      - source: "Elbert 1a AB40Synthesis_BrainISF"
        supports: "Saturable C99 cleavage with C83/C99 denominator competition"

  - name: C99_to_AB42_AICD_Neuron
    reactants:
      - C99_Neuron
    products:
      - AB42_BrainISF
      - AICD_Neuron
    rate_type: custom_conc_per_time
    rate_equation: "(k_gammasec_AB42 / Km_C99_Abeta) * (C99_Neuron / V_Neuron) / (1 + (C83_Neuron / V_Neuron) / Km_C83_p3 + (C99_Neuron / V_Neuron) / Km_C99_Abeta) * (GAMMA_SECRETASE_Neuron / GAMMA_SECRETASE_ref)"
    rate_parameters:
      - k_gammasec_AB42
      - Km_C99_Abeta
      - Km_C83_p3
      - GAMMA_SECRETASE_ref
      - V_Neuron
    evidence:
      - source: "Elbert 1a reaction AB42Synthesis_BrainISF"
        snippet: "AB42Synthesis_BrainISF : C99_EndoLysNeuron -> AB42_BrainISF; ..."
        supports: "Gamma-secretase production of AB42 from C99"
    rate_law_evidence:
      - source: "Elbert 1a AB42Synthesis_BrainISF"
        supports: "Saturable C99 cleavage form reused for AB42 branch"

  - name: AB40Degradation_BrainISF
    reactants:
      - AB40_BrainISF
    products: []
    rate_type: MA
    rate_parameters:
      - IDE_Kcat_ISF_AB40
